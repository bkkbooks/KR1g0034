body:
  text: 五經然否論古文尚書說武王崩成王年十三推武王以庚辰歲崩周公以壬午歲出居東癸未歲反禮公冠記周公冠成王命史作祝辭告是除喪冠也周公未反成王冠辨開金縢之書時十六矣是成王十五周公冠之而後出也杜佑通典卷五十六劉恕通鑑外紀卷三引上六句反作還國不可久無儲二故天子諸侯十五而冠十五而娶娶必先冠以夫婦之道王教之本不可以童子之道治之禮十五而成童以次成人欲人君早有繼體故因以為節書稱成王十五年而冠著在金縢周禮媒氏曰今男三十而娶女二十而嫁內則云女子十五而笄說曰許嫁也是故男自二十以及三十女自十五以及二十皆得以嫁娶先是則速後是則晚凡人嫁娶或以賢淑或以方類豈但年數而已若必差十年乃為夫婦是廢賢淑方類苟比年數而已禮何為然哉則三十而娶二十而嫁說嫁娶之限蓋不得復過此爾故舜年三十無室書稱曰鰥周禮云女子年二十未有嫁者仲春之月奔者不禁奔者不待禮聘因媒請嫁而巳矣春秋穀梁傳文十二年范寧集解詩周召南標有梅孔穎達正義漢初或云三老答天子拜遭王莽之亂法度殘缺漢中興定儀禮群臣欲令三老答拜城門校尉董鈞駁曰養三老所以教事父之道也若答拜是使天子答子拜也詔從鈞儀譙周論之曰禮尸服上服猶以非親之故答子拜士見異國君亦答拜是皆不得視猶子也通典卷六十七後漢書禮儀志劉昭注喪服小記庶子不為長子斬不繼祖與禰故也此但別庶子而下言不繼祖者謂庶子身不繼禰故其長子為不繼祖合而言之也通典卷八十八案此上諸所引並明標五經然否論四時祭各於其廟室中神位奧西牆下東嚮諸侯廟木主在尸之南為在尸上也東牆以南為上通典卷四十八引蜀譙周禮祭集志天子之廟始祖及高曾祖考皆月朔加薦以象平生朔食也謂之月祭二祧之廟時祭無月祭也凡五穀新熟珍物新成天子以薦宗廟禮未薦不敢食新孝敬之道也其月朔薦及臘薦薦新皆奠無尸故群廟皆一朝之間盡畢通典卷四十九引蜀譙周禮祭集志又卷五十二引作譙周禮志自天子至無月祭無字上有時祭二字據補童子不釋成人小功親以上皆服本親之縗童子不杖不廬不絻不麻當室者絻麻十四已下不堪麻則不通典卷八十一引譙周縗服圖喪服𧞓縗三年條曰慈母如母父在為慈母則條不見今文載所說慈於貴妾父在𧞓縗周慈於賤妾父在大功九月故文鄭氏說此主大夫士之妾子父命為母子者也大夫之妾子以父命在為母大功士之妾了為母周矣其大夫降爵一等士無爵降例也父卒皆伸按經大夫之妾子父在為其母大功不別貴賤自非祖嫡大夫以爵降一等故妾之子從父例母一等為大夫妾雖有貴者不得體君何得不為爵降凡此之類今文說不如古也通典卷九十四引譙周集圖天子諸侯為外父小功諸侯嫡子為母妻及外祖父母皆如國人舊說外祖父母母族之正統妻之父母亦妻族之正統也母妻與己尊同母妻所不敢降亦不降通典卷八十一庶子之為殤者祔祠於祖廟庶子共其牲物而宗子主其禮士庶人之庶子雖成子而無後亦祔祠於祖其主之如祭殤殤及無後者祔祠於祖廟皆異日別祭於其處耳天子諸侯之庶子無子不得祔祠於其廟當從其庶祖昭穆同也通典卷五十二引譙周案此下皆通典引譙周不著書名篇目統附於後國君為卿大夫皮辨錫縗以居他事出亦如之其弔則皆錫縗布辨而絰三月復吉其弔主則服辨絰疑縗亦往則服出則不公及大夫弔衆妾如君弔他國卿大夫皮辨錫縗不絰君使人弔襚主人迎于寢門外見使者不哭先入門右北面弔者入升自西階東面主人前至中庭弔者致君命主人哭拜稽顙成踊弔者出立主人拜送于門外君使禭者左執領右執要致命訖入室衣尸乃出他皆如弔既斂之後不衣尸委于尸東席上凡主人出送因拜賓所來者拜訖皆即位西階下東面哭踊訖反室大夫弔服以錫縗用緦麻布而夾理之曰錫士弔服以疑縗用錫布為衣而素裳擬於吉也其冠各以其縗歸其家猶弔服辨絰以居其以他事出則脫絰三月既葬服吉五代兄弟相為亦然凡大夫弔其臣異者主人不迎于門外主君入即位堂下西面主人北面衆主人南面通典卷八十三為父始死去冠及羔裘大帶其笄纚革帶皆如故衣布深衣扱上衽徒跣拊心號咷而無常聲哭踊無數始死者至小斂大功以上皆在室丈夫在尸床東西面婦人夾床東面雖諸父兄姑姊不踰姑姊次其後餘衆婦人戶外北面衆兄弟堂下北面諸侯之喪唯主人主婦坐其餘皆立卿大夫亦在室外命婦戶外北面有司庶士堂下北面大夫之喪主人主婦及有命夫命婦者皆坐無者皆立室老亦立室老之妻戶外北面衆臣堂下北面士之喪父兄子姓婦人皆坐他皆如前父為長子不徒跣不啜粥凡父兄雖往哭不於子弟之宮設哀次也女子之未嫁為父始卒去彩飾之屬笄纚及帶如故衣布深衣不扱上衽不徒跣吉白麻屨無姁拊心哭泣無數不𥘵其踊不絶地父卒為母始死去元冠尸襲衣後因其笄纚而加素冠其餘與為父同通典卷八十四遷祖之奠升自西階如初及日載于車下奠設于西方及陳遣物於庭訖徹奠以巾席俟于西方乃祖車旋向外離於載處為行始也布席乃奠如初通典卷八十六為父至葬腰絰散垂如少幼時反哭於廟升自西階虞祭於寢杖不入室通典卷八十七繼母嫁猶服周以親母可知故無經也通典卷八十九凡外親正服皆緦加者不過小功今異父兄弟父沒母嫁所生者皆相報服通典卷九十一父母既沒兄弟異居又或改娶則娣姒有初異室者矣若不本夫為論唯取同室而已則親娣姒與堂娣姒不應有殊經殊其服以夫之親疏者是本夫與為倫也婦人於夫之昆弟本有大功之倫從服其婦有小功之倫於夫從父昆弟有小功之倫從服其婦有緦麻之倫也夫以遠之而不服故婦從無服而服之然則初而異室猶自以其倫服通典卷九十二大夫之子父在降旁親亦如大夫從父厭也大夫庶子為妻父母無服為其母妻大功父沒皆如國人通典卷九十三諸侯夫人亦隨其君降旁親無服為其族亦降旁親非諸侯自周以下無服為其父母及祖如國人又大夫命婦為其旁親以大夫爵降又降一等其為父後者不以嫁降但以尊降一等同上諸侯降旁親旁親若為諸侯若女子嫁於諸侯者服如國人諸侯嗣子為母妻及外祖父母妻父母皆如國人嗣子雖無正爵與君為體其誓於天子則下其成人一等未誓次小國君其妻君為之主故嗣子之所為服服如國人舊說外祖父母母族正統也妻之父母妻族正統也母妻與已尊同其所不降亦不降也故嗣子亦不降妻之父母諸侯夫人為其父母祖如國人大夫命婦為其昆弟為父後者大宗則服如國人也通典卷九十三父卒母嫁非父所絶為之服周可也通典卷九十四妾不得有繼母名慈母也但慈已無父命者不過小功也同上其母沒自服其母之黨則繼母之黨無服出母之子為繼母之黨服則為其母之黨無服也通典卷九十五禮哭于門內之右明為變位也後日之哭既朝奠其殯卒事出改服即位如初亦三日五哭也通典卷九十七大夫受畿內菜邑有家臣雖又別典鄉遂之事其下屬皆上相屬其吏非臣也秦漢無復菜邑之家臣郡縣吏權假斬縗代至則除之通典九十九為師如本有服降而無服者其為師少長所成就者雖服除心喪皆三年通典卷一百一
